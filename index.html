<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edge Conference AI Co-Host</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: #000; overflow: hidden;
    font-family: Segoe UI, Arial, sans-serif;
  }
  #stage {
    position: relative; width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  #remoteVideo video {
    height: 100vh; width: auto; max-width: 100vw;
    object-fit: cover;
  }
  #captionBar {
    position: absolute; bottom: 40px; left: 10%; right: 10%;
    text-align: center; color: #fff; font-size: 28px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    padding: 0 40px; opacity: 0; transition: opacity 0.3s;
    max-height: 35vh; overflow: hidden;
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
  }
  #captionBar.show { opacity: 1; }
  #listeningIndicator {
    position: absolute; top: 30px; right: 40px;
    width: 18px; height: 18px; border-radius: 50%;
    background: #ff3b30; opacity: 0; transition: opacity 0.2s;
    box-shadow: 0 0 12px #ff3b30;
  }
  #listeningIndicator.active { opacity: 1; animation: pulse 1s infinite; }
  @keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.3);} 100%{transform:scale(1);} }
  #idleOverlay {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; background: #000; color: #fff; font-size: 22px;
    letter-spacing: 1px; cursor: pointer; text-align:center; padding: 20px;
  }
  #idleOverlay small { display:block; margin-top:10px; font-size:14px; color:#9adfff; }
</style>
</head>
<body>
  <div id="stage">
    <div id="remoteVideo"></div>
    <div id="listeningIndicator"></div>
    <div id="captionBar"></div>
    <div id="idleOverlay">
      Click anywhere or press SPACE to bring the AI co-host on stage
      <small>Just say "Kiri" once she's live to talk to her. Press ESC to stop.</small>
    </div>
  </div>

  <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
