<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge Conference AI Co-Host</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: #000; overflow: hidden;
    font-family: Segoe UI, Arial, sans-serif;
  }

  #stage {
    position: relative; width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  #remoteVideo video {
    height: 100vh; width: auto; max-width: 100vw;
    object-fit: cover;
  }

  #captionBar {
    position: absolute; bottom: 40px; left: 10%; right: 10%;
    text-align: center; color: #fff; font-size: 28px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    padding: 0 40px; opacity: 0; transition: opacity 0.3s;
    max-height: 35vh; overflow: hidden;
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
    z-index: 5;
  }

  #captionBar.show { opacity: 1; }

  #listeningIndicator {
    position: absolute; top: 30px; right: 40px;
    width: 18px; height: 18px; border-radius: 50%;
    background: #ff3b30; opacity: 0; transition: opacity 0.2s;
    box-shadow: 0 0 12px #ff3b30;
    z-index: 6;
  }

  #listeningIndicator.active { opacity: 1; animation: pulse 1s infinite; }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  #idleOverlay {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; background: #000; color: #fff; font-size: 22px;
    letter-spacing: 1px; cursor: pointer; text-align:center; padding: 20px;
    z-index: 10;
  }

  #idleOverlay small {
    display:block; margin-top:10px; font-size:14px; color:#9adfff;
  }

  #controlPanel {
    position: absolute;
    top: 24px;
    left: 24px;
    width: 360px;
    max-width: calc(100vw - 48px);
    background: rgba(10, 18, 34, 0.86);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 16px;
    backdrop-filter: blur(12px);
    color: #fff;
    z-index: 11;
  }

  #controlPanel h3 {
    margin: 0 0 10px;
    font-size: 16px;
  }

  #controlPanel label {
    display: block;
    font-size: 13px;
    margin: 12px 0 6px;
    color: #cfe4ff;
  }

  #controlPanel select,
  #controlPanel textarea,
  #controlPanel button {
    width: 100%;
    box-sizing: border-box;
    border-radius: 10px;
    border: 0;
    padding: 10px 12px;
    font-size: 14px;
  }

  #controlPanel select,
  #controlPanel textarea {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.12);
  }

  #userMessageBox {
    min-height: 110px;
    resize: vertical;
  }

  .buttonRow {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }

  #controlPanel button {
    cursor: pointer;
    background: #7be0ff;
    color: #04111f;
    font-weight: 600;
  }

  #chatHistory {
    margin-top: 14px;
    max-height: 180px;
    overflow-y: auto;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px;
    font-size: 13px;
    line-height: 1.45;
  }

  #sessionStatus {
    font-size: 13px;
    color: #9adfff;
    margin-bottom: 8px;
  }

  @media (max-width: 640px) {
    #controlPanel {
      top: 12px;
      left: 12px;
      right: 12px;
      width: auto;
      max-width: none;
    }

    #captionBar {
      left: 4%;
      right: 4%;
      bottom: 24px;
      font-size: 20px;
      padding: 0 12px;
    }
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="remoteVideo"></div>
    <div id="listeningIndicator"></div>
    <div id="captionBar"></div>

    <div id="controlPanel">
      <h3>Kiri Panel Controls</h3>
      <div id="sessionStatus">Disconnected</div>

      <label for="activeSpeaker">Who just spoke?</label>
      <select id="activeSpeaker">
        <option value="Craig">Craig</option>
        <option value="Naas">Naas</option>
      </select>

      <label for="responseMode">Response mode</label>
      <select id="responseMode">
        <option value="react">React</option>
        <option value="expand">Expand</option>
        <option value="transition">Transition</option>
        <option value="challenge">Challenge</option>
      </select>

      <label for="userMessageBox">Panel input</label>
      <textarea id="userMessageBox" placeholder="Type what Craig or Naas just said..."></textarea>

      <div class="buttonRow">
        <button id="startSession" type="button">Start Session</button>
        <button id="stopSession" type="button">Stop Session</button>
        <button id="submitTurn" type="button">Send to Kiri</button>
        <button id="stopSpeaking" type="button">Stop Speaking</button>
      </div>

      <div id="chatHistory"></div>
    </div>

    <div id="idleOverlay">
      Click anywhere or press SPACE to bring the AI co-host on stage
      <small>Just say "Kiri" once she's live to talk to her. Press ESC to stop.</small>
    </div>
  </div>

  <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
