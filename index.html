<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kiri Live Panel</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: "Segoe UI", Arial, sans-serif;
  }

  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  #remoteVideo {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  #remoteVideo video {
    height: 100vh;
    width: auto;
    max-width: 100vw;
    object-fit: cover;
  }

  #captionBar {
    position: absolute;
    left: 8%;
    right: 8%;
    bottom: 34px;
    color: #fff;
    text-align: center;
    font-size: 28px;
    line-height: 1.35;
    text-shadow: 0 2px 10px rgba(0,0,0,0.82);
    opacity: 0;
    transition: opacity 0.25s ease;
    z-index: 20;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  #captionBar.show {
    opacity: 1;
  }

  #listeningIndicator {
    position: absolute;
    top: 26px;
    right: 26px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #ff3b30;
    box-shadow: 0 0 14px rgba(255,59,48,0.9);
    opacity: 0;
    transition: opacity 0.2s ease;
    z-index: 21;
  }

  #listeningIndicator.active {
    opacity: 1;
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.28); }
    100% { transform: scale(1); }
  }

  #statusPill {
    position: absolute;
    top: 22px;
    left: 22px;
    z-index: 21;
    color: #d9efff;
    background: rgba(8, 16, 28, 0.72);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px;
    padding: 10px 14px;
    font-size: 13px;
    letter-spacing: 0.2px;
    backdrop-filter: blur(10px);
  }

  #debugPanel {
    position: absolute;
    left: 18px;
    bottom: 18px;
    width: min(420px, calc(100vw - 36px));
    max-height: 34vh;
    overflow: auto;
    z-index: 25;
    background: rgba(10, 18, 34, 0.84);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 12px 14px;
    color: #d6e8ff;
    font-size: 12px;
    line-height: 1.45;
    display: none;
    backdrop-filter: blur(10px);
  }

  #debugPanel.visible {
    display: block;
  }

  #debugPanel h4 {
    margin: 0 0 8px;
    font-size: 12px;
    color: #fff;
  }

  #debugLog {
    white-space: pre-wrap;
    word-break: break-word;
  }

  @media (max-width: 768px) {
    #captionBar {
      left: 4%;
      right: 4%;
      bottom: 22px;
      font-size: 20px;
    }

    #statusPill {
      font-size: 12px;
      padding: 8px 12px;
    }
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="remoteVideo"></div>
    <div id="captionBar"></div>
    <div id="listeningIndicator"></div>
    <div id="statusPill">Starting…</div>

    <div id="debugPanel">
      <h4>Live Debug</h4>
      <div id="debugLog"></div>
    </div>
  </div>

  <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
